name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to release, for example 2026.3.26 or 2026.3.26.1"
        required: true
        type: string
      release_notes:
        description: "Optional release notes. Leave blank to auto-generate notes."
        required: false
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create this release as a draft"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set release variables for manual run
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $version = '${{ inputs.release_version }}'.Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'release_version is required.'
          }
          if ($version -notmatch '^\d{4}\.\d{1,2}\.\d{1,2}(\.\d+)?$') {
            throw "release_version must match YYYY.M.D or YYYY.M.D.PATCH, got: $version"
          }

          $tag = "v$version"
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Set release variables for tag push
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if (-not $tag.StartsWith('v')) {
            throw "Expected tag starting with v, got: $tag"
          }

          $version = $tag.Substring(1)
          if ($version -notmatch '^\d{4}\.\d{1,2}\.\d{1,2}(\.\d+)?$') {
            throw "Release tag version must match YYYY.M.D or YYYY.M.D.PATCH, got: $version"
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Sync package.json version to release version
        shell: pwsh
        run: |
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2)+'\n');"
          Get-Content package.json

      - name: Type check
        run: npm run typecheck

      - name: Build app
        run: npx electron-vite build

      - name: Package app (Windows)
        run: npx electron-builder --win portable nsis --x64 --publish never

      - name: Upload workflow artifacts (Windows)
        uses: actions/upload-artifact@v6
        with:
          name: yarrtorio-release-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set release variables for manual run
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION='${{ inputs.release_version }}'
          if [ -z "$VERSION" ]; then
            echo "release_version is required."
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(\.[0-9]+)?$ ]]; then
            echo "release_version must match YYYY.M.D or YYYY.M.D.PATCH, got: $VERSION"
            exit 1
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=v$VERSION" >> $GITHUB_ENV

      - name: Set release variables for tag push
        if: github.event_name == 'push'
        run: |
          TAG='${{ github.ref_name }}'
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Expected tag starting with v, got: $TAG"
            exit 1
          fi
          VERSION="${TAG:1}"
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(\.[0-9]+)?$ ]]; then
            echo "Release tag version must match YYYY.M.D or YYYY.M.D.PATCH, got: $VERSION"
            exit 1
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV

      - name: Sync package.json version to release version
        run: |
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2)+'\n');"
          cat package.json

      - name: Type check
        run: npm run typecheck

      - name: Build app
        run: npx electron-vite build

      - name: Package app (Linux)
        run: npx electron-builder --linux AppImage --x64 --publish never

      - name: Upload workflow artifacts (Linux)
        uses: actions/upload-artifact@v6
        with:
          name: yarrtorio-release-linux
          path: |
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v6
        with:
          name: yarrtorio-release-windows
          path: dist-windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v6
        with:
          name: yarrtorio-release-linux
          path: dist-linux

      - name: Set release variables for manual run
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION='${{ inputs.release_version }}'
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(\.[0-9]+)?$ ]]; then
            echo "release_version must match YYYY.M.D or YYYY.M.D.PATCH, got: $VERSION"
            exit 1
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=v$VERSION" >> $GITHUB_ENV

      - name: Set release variables for tag push
        if: github.event_name == 'push'
        run: |
          TAG='${{ github.ref_name }}'
          VERSION="${TAG:1}"
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(\.[0-9]+)?$ ]]; then
            echo "Release tag version must match YYYY.M.D or YYYY.M.D.PATCH, got: $VERSION"
            exit 1
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV

      - name: Generate release checksums
        run: |
          > SHA256SUMS.txt

          for f in dist-windows/*.exe dist-linux/*.AppImage; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> SHA256SUMS.txt
            fi
          done

          cat SHA256SUMS.txt

      - name: Create or update GitHub release
        run: |
          TAG="$RELEASE_TAG"
          TITLE="Yarrtorio $RELEASE_VERSION"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" \
              $([ '${{ inputs.prerelease }}' == 'true' ] && echo "--prerelease" || true) \
              $([ '${{ inputs.draft }}' == 'true' ] && echo "--draft" || true)
          else
            if [ '${{ github.event_name }}' == 'workflow_dispatch' ]; then
              NOTES='${{ inputs.release_notes }}'
              if [ -z "$NOTES" ]; then
                gh release create "$TAG" --title "$TITLE" --target '${{ github.sha }}' --generate-notes
              else
                echo "$NOTES" > /tmp/notes.txt
                gh release create "$TAG" --title "$TITLE" --target '${{ github.sha }}' --notes-file /tmp/notes.txt
              fi
            else
              gh release create "$TAG" --title "$TITLE" --verify-tag --generate-notes
            fi
          fi

      - name: Upload all assets to GitHub release
        run: |
          TAG="$RELEASE_TAG"

          # Upload Windows assets
          for f in dist-windows/*; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber
          done

          # Upload Linux assets
          for f in dist-linux/*; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber
          done

          gh release upload "$TAG" SHA256SUMS.txt --clobber
